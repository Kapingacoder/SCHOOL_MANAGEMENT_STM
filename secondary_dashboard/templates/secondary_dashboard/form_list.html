{% extends 'secondary_dashboard/base.html' %}

{% block content %}
<div class="container">
    <h1>Forms</h1>
    <div class="list-group">
        {% for form in forms %}
            <a href="{% url 'secondary_dashboard:class_management' form.id %}" class="list-group-item list-group-item-action">{{ form.name }}</a>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block back_to_menu %}
<a href="{% url 'secondary_dashboard:dashboard' %}" class="btn btn-outline-primary mb-3">
    <i class="fas fa-arrow-left"></i> Back to Menu
</a>
{% endblock %}
