{% extends 'secondary_dashboard/base.html' %}

{% block content %}
<div class="container">
    <h1>Teachers</h1>
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            {% for teacher in teachers %}
                <tr>
                    <td>{{ teacher.get_full_name }}</td>
                    <td>{{ teacher.email }}</td>
                    <td>{{ teacher.phone_number }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

{% block back_to_menu %}
<a href="{% url 'secondary_dashboard:dashboard' %}" class="btn btn-outline-primary mb-3">
    <i class="fas fa-arrow-left"></i> Back to Menu
</a>
{% endblock %}
