{% extends 'secondary_dashboard/base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'secondary_dashboard/dashboard.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h2 class="mb-0" data-en="Delete Document" data-sw="Futa Hati">Delete Document</h2>
                </div>
                <div class="card-body">
                    <p data-en="Are you sure you want to delete this document?" data-sw="Je, una uhakika unataka kufuta hati hii?">Are you sure you want to delete this document?</p>
                    <div class="alert alert-warning">
                        <strong>{{ object.title }}</strong><br>
                        <small>Type: {{ object.get_document_type_display }}</small>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'secondary_dashboard:documents' %}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Delete Document
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
