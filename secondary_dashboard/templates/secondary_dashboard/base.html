{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secondary School Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {# Link to the external CSS file for this page #}
    <link rel="stylesheet" href="{% static 'base/secondary_dashboard_base.css' %}">
    <link rel="stylesheet" href="{% static 'secondary_dashboard/dashboard.css' %}">
</head>
<body>
    <div class="d-flex" id="wrapper">
        
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-secondary" id="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="navbar-nav ms-auto">
                        <span class="nav-item nav-link">Welcome, {{ request.user.get_full_name|default:request.user.username }}</span>
                        <a class="nav-item nav-link" href="{% url 'accounts:teacher_login' %}">Logout</a>
                    </div>
                </div>
            </nav>
            
            <div class="container-fluid px-4 py-4">
                {% block back_to_menu %}
                {% endblock %}
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle sidebar
        document.getElementById('menu-toggle').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('wrapper').classList.toggle('toggled');
        });
        
        // Highlight active menu item
        const currentUrl = window.location.pathname;
        const sidebarLinks = document.querySelectorAll('#sidebar-wrapper a');
        
        sidebarLinks.forEach(link => {
            if (link.getAttribute('href') === currentUrl) {
                link.classList.add('active');
            }
        });
        
       // AJAX for saving marks
	        function saveMark(studentId, subjectId, score, term, year) {
	            fetch(window.location.pathname, {
	                method: 'POST',
	                headers: {
	                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: `student_id=${studentId}&subject_id=${subjectId}&score=${score}&term=${term}&year=${year}`
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    alert('Error saving mark');
                }
            });
        }
        
        // Attach event listeners to mark inputs
        document.querySelectorAll('.mark-input').forEach(input => {
            input.addEventListener('change', function() {
                const studentId = this.dataset.studentId;
                const subjectId = this.dataset.subjectId;
                const score = this.value;
                const term = this.dataset.term;
                const year = this.dataset.year;
                
                saveMark(studentId, subjectId, score, term, year);
            });
        });
    </script>
</body>
</html>
