{% extends 'primary_dashboard/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Subjects</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Subject Name</label>
                        {{ form.name }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Subject Code</label>
                        {{ form.code }}
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>Add Subject
                </button>
            </form>
            <hr>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for subject in subjects %}
                        <tr>
                            <td>{{ subject.name }}</td>
                            <td>{{ subject.code }}</td>
                            <td>
                                <a href="{% url 'primary_dashboard:edit_subject' subject.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
                                <a href="{% url 'primary_dashboard:delete_subject' subject.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
