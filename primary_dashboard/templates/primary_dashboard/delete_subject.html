{% extends 'primary_dashboard/base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1 class="display-6">Delete Subject</h1>
    </div>
</div>

<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-trash-alt me-2"></i>Confirm Deletion</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the subject "{{ subject.name }}"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash-alt me-2"></i>Delete
                    </button>
                    <a href="{% url 'primary_dashboard:settings' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
