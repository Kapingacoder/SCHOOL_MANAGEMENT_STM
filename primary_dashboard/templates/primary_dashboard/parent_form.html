{% extends 'primary_dashboard/base.html' %}

{% block title %}Add Parent{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-user-plus me-2"></i>Register New Parent</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="id_first_name" class="form-label">Parent First Name</label>
                                <input type="text" name="first_name" maxlength="50" class="form-control" required id="id_first_name">
                            </div>
                            <div class="col-md-4">
                                <label for="id_middle_name" class="form-label">Parent Middle Name</label>
                                <input type="text" name="middle_name" maxlength="50" class="form-control" id="id_middle_name">
                            </div>
                            <div class="col-md-4">
                                <label for="id_last_name" class="form-label">Parent Last Name</label>
                                <input type="text" name="last_name" maxlength="50" class="form-control" required id="id_last_name">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="id_phone" class="form-label">Phone</label>
                            <input type="text" name="phone" maxlength="15" class="form-control" id="id_phone">
                        </div>
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" id="id_email">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register Parent</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
